version: "3.9"

services:
  db:
    image: postgres:16
    container_name: mrtft_postgres
    environment:
      POSTGRES_USER: tftuser
      POSTGRES_PASSWORD: tftpass
      POSTGRES_DB: mrtftdb
    ports:
      - "5432:5432"
    volumes:
      - mrtft_pgdata:/var/lib/postgresql/data

volumes:
  mrtft_pgdata: